version: '3.8'

services:
  wabro-backend:
    build: ./apps/wabro-backend
    container_name: wabro-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - WABRO_PASSWORD=${WABRO_PASSWORD}
    volumes:
      - ./apps/wabro-backend/sessions:/app/sessions
    restart: unless-stopped

  wabro-frontend:
    build: ./apps/wabro-frontend
    container_name: wabro-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://wabro-backend:3001
      - PORT=3000
    depends_on:
      - wabro-backend
    restart: unless-stopped
