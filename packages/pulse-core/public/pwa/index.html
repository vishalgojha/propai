<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#d4ff00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PropAI Pulse</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0a'/><polygon points='18,4 10,18 15,18 14,28 22,14 17,14' fill='%23d4ff00'/></svg>">
<link rel="manifest" href="#" id="manifestLink">
<style>
@import url('https://api.fontshare.com/v2/css?f[]=geist@400,500,600,700&f[]=geist-mono@400,500,600,700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #222222;
  --yellow: #d4ff00;
  --green: #00ff88;
  --red: #ff4444;
  --text: #e0e0e0;
  --muted: #666666;
  --font-mono: 'Geist Mono', monospace;
  --font-head: 'Geist', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 14px;
  overflow: hidden;
}

.hidden { display: none !important; }

/* APP SHELL */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* HEADER */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}

.app-logo {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 700;
  color: var(--yellow);
  display: flex;
  align-items: center;
  gap: 8px;
}

.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-live 2s infinite;
}

@keyframes pulse-live {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.icon-btn:hover { background: var(--border); }

/* TAB BAR */
.tab-bar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab {
  flex: 1;
  padding: 10px 8px;
  text-align: center;
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.tab.active {
  color: var(--yellow);
  border-bottom-color: var(--yellow);
}

/* SCREEN CONTAINER */
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

.screen::-webkit-scrollbar { width: 4px; }
.screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ONBOARDING */
.onboarding-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  min-height: 100%;
  gap: 32px;
}

.onboarding-title {
  font-family: var(--font-head);
  font-size: 28px;
  font-weight: 800;
  color: var(--yellow);
  text-align: center;
  line-height: 1.1;
}

.onboarding-sub {
  color: var(--muted);
  text-align: center;
  font-size: 13px;
  line-height: 1.6;
  max-width: 320px;
}

.ai-cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 400px;
}

.ai-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  gap: 14px;
}

.ai-card:hover { border-color: var(--yellow); }
.ai-card.selected { border-color: var(--yellow); background: #1a1a0a; }

.ai-card-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.ai-card-info { flex: 1; }
.ai-card-name { font-family: var(--font-head); font-weight: 700; font-size: 15px; color: var(--text); }
.ai-card-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

.ai-card-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 700;
}

.badge-recommended { background: #1a3a00; color: var(--green); }
.badge-powerful { background: #1a1a3a; color: #aaaaff; }
.badge-fallback { background: #2a2a2a; color: var(--muted); }

.ai-card-check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
}

.ai-card.selected .ai-card-check {
  border-color: var(--yellow);
  background: var(--yellow);
  color: #000;
}

.key-input-section {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.key-input-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.key-input-row {
  display: flex;
  gap: 8px;
}

.key-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}

.key-input:focus { border-color: var(--yellow); }

.test-btn {
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  transition: background 0.15s;
  white-space: nowrap;
}

.test-btn:hover { background: var(--border); }
.test-btn.testing { opacity: 0.6; pointer-events: none; }
.test-btn.success { border-color: var(--green); color: var(--green); }
.test-btn.error { border-color: var(--red); color: var(--red); }

.key-trust {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
}

.key-trust-icon { font-size: 14px; }

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--yellow);
  color: #000;
  border: none;
  border-radius: 10px;
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}

.submit-btn:hover { opacity: 0.9; }
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { opacity: 0.4; pointer-events: none; }

/* HOME / STREAM */
.stream-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-title {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sidebar-toggle {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

#sidebarOpenBtn {
  display: none;
}

@media (max-width: 768px) {
  #sidebarOpenBtn { display: flex; }
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 201;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: flex; }
}

/* INSTALL BANNER */
.install-banner {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 100;
}

.install-banner-text {
  flex: 1;
  font-size: 12px;
  color: var(--text);
}

.install-banner-text strong { color: var(--yellow); }

.install-banner-btn {
  padding: 8px 16px;
  background: var(--yellow);
  color: #000;
  border: none;
  border-radius: 8px;
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}

.install-banner-dismiss {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
}

/* UTILS */
.section-head {
  padding: 12px 16px 8px;
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}
</style>
</head>
<body>

<div id="app">
  <header class="app-header">
    <div class="app-logo">
      <span>PROPAI PULSE</span>
      <span class="live-dot" id="liveDot"></span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
    </div>
  </header>

  <nav class="tab-bar" id="tabBar">
    <div class="tab active" data-tab="stream">STREAM</div>
    <div class="tab" data-tab="agent">AGENT</div>
    <div class="tab" data-tab="whatsapp">WHATSAPP</div>
    <div class="tab" data-tab="settings">SETTINGS</div>
  </nav>

  <main class="screen" id="mainScreen">
    <!-- screens injected by JS -->
  </main>
</div>

<div id="installBanner" class="install-banner hidden">
  <span class="install-banner-text">Install <strong>PropAI Pulse</strong> for quick access</span>
  <button class="install-banner-btn" id="installBtn">Install</button>
  <button class="install-banner-dismiss" id="installDismiss">&#x2715;</button>
</div>

<script>
// ─── PWA BOOTSTRAP ────────────────────────────────────────────────────────────

function createBlobURL(content, type) {
  return URL.createObjectURL(new Blob([content], { type }));
}

const manifestJSON = JSON.stringify({
  name: 'PropAI Pulse',
  short_name: 'Pulse',
  description: 'WhatsApp real estate listings + AI agent',
  start_url: '/',
  display: 'standalone',
  background_color: '#0a0a0a',
  theme_color: '#d4ff00',
  orientation: 'portrait',
  icons: []
});

const manifestURL = createBlobURL(manifestJSON, 'application/manifest+json');
document.getElementById('manifestLink').href = manifestURL;

const swCode = `
var CACHE = 'pulse-v1';
var OFFLINE_URL = 'offline';

self.addEventListener('install', function(e) {
  self.skipWaiting();
});

self.addEventListener('activate', function(e) {
  e.waitUntil(clients.claim());
});

self.addEventListener('fetch', function(e) {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request)
      .then(function(res) {
        if (res.ok) {
          var clone = res.clone();
          caches.open(CACHE).then(function(cache) { cache.put(e.request, clone); });
        }
        return res;
      })
      .catch(function() {
        return caches.match(e.request).then(function(cached) {
          if (cached) return cached;
          if (e.request.mode === 'navigate') {
            return caches.match(OFFLINE_URL).then(function(r) {
              return r || new Response('Pulse is offline — listings cached locally', { status: 200 });
            });
          }
          return new Response('Offline', { status: 503 });
        });
      })
  );
});
`;

const swURL = createBlobURL(swCode, 'application/javascript');
navigator.serviceWorker.register(swURL).catch(function() {});

// Generate SVG icon and update manifest
function svgIconDataURL(size) {
  const s = encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${Math.round(size * 0.18)}" fill="#0a0a0a"/><polygon points="${Math.round(size*0.56)},${Math.round(size*0.12)} ${Math.round(size*0.31)},${Math.round(size*0.56)} ${Math.round(size*0.47)},${Math.round(size*0.56)} ${Math.round(size*0.44)},${Math.round(size*0.88)} ${Math.round(size*0.69)},${Math.round(size*0.44)} ${Math.round(size*0.53)},${Math.round(size*0.44)}" fill="#d4ff00"/></svg>`);
  return `data:image/svg+xml,${s}`;
}

const icon192 = svgIconDataURL(192);
const icon512 = svgIconDataURL(512);

const updatedManifest = JSON.parse(manifestJSON);
updatedManifest.icons = [
  { src: icon192, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
  { src: icon512, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
];
document.getElementById('manifestLink').href = createBlobURL(JSON.stringify(updatedManifest), 'application/manifest+json');

// ─── STATE ───────────────────────────────────────────────────────────────────

const API_BASE = 'https://pulse.propai.live/api';

const state = {
  screen: 'loading',
  user: null,
  token: localStorage.getItem('pulse_token') || null,
  aiKey: '',
  aiProvider: '',
  listings: [],
  chatHistory: [],
  filter: 'ALL',
  selectedLocation: 'ALL',
  sidebarOpen: false,
  sidebarSearchQuery: '',
  installPrompt: null,
  deferredPrompt: null,
  isOnline: navigator.onLine,
  waState: { state: 'disconnected', qr: null, error: null },
  waSSE: null,
  voiceEnabled: false,
  voiceSpeed: 'normal',
  voiceApiKey: '',
  voiceVoiceId: 'JPBXnM1EGM4hJz45K1rT',
  currentlyPlaying: null,
  voiceEvents: null,
  groupInsights: null,
};

function saveChatHistory() {
  try {
    localStorage.setItem('pulse_chat_history', JSON.stringify(state.chatHistory));
  } catch {}
}

function loadChatHistory() {
  try {
    const saved = localStorage.getItem('pulse_chat_history');
    if (saved) state.chatHistory = JSON.parse(saved);
  } catch {}
}

async function loadAuth() {
  const token = localStorage.getItem('pulse_token');
  if (!token) {
    state.screen = 'login';
    return;
  }
  try {
    const res = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    if (data.authenticated && data.user) {
      state.user = data.user;
      state.token = token;
      await loadUserSettings();
      state.screen = 'stream';
    } else {
      localStorage.removeItem('pulse_token');
      state.token = null;
      state.screen = 'login';
    }
  } catch {
    state.screen = 'login';
  }
}

async function loadUserSettings() {
  try {
    const res = await fetch('/api/auth/settings', { headers: { Authorization: `Bearer ${state.token}` } });
    const settings = await res.json();
    state.aiKey = settings.aiKey || '';
    state.aiProvider = settings.aiProvider || '';
    state.voiceApiKey = settings.voiceApiKey || '';
    state.voiceVoiceId = settings.voiceVoiceId || 'JPBXnM1EGM4hJz45K1rT';
    state.voiceSpeed = settings.voiceSpeed || 'normal';
    state.voiceEnabled = settings.voiceEnabled || false;
    localStorage.setItem('pulse_ai_key', state.aiKey);
    localStorage.setItem('pulse_ai_provider', state.aiProvider);
  } catch (e) {
    console.error('Failed to load settings:', e);
  }
}

async function saveUserSettings() {
  if (!state.token) return;
  try {
    await fetch('/api/auth/settings', {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${state.token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        aiKey: state.aiKey,
        aiProvider: state.aiProvider,
        voiceApiKey: state.voiceApiKey,
        voiceVoiceId: state.voiceVoiceId,
        voiceSpeed: state.voiceSpeed,
        voiceEnabled: state.voiceEnabled,
      }),
    });
  } catch (e) {
    console.error('Failed to save settings:', e);
  }
}

window.addEventListener('online', () => { state.isOnline = true; render(); });
window.addEventListener('offline', () => { state.isOnline = false; render(); });

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  state.deferredPrompt = e;
  const banner = document.getElementById('installBanner');
  banner.classList.remove('hidden');
});

document.getElementById('installBtn').addEventListener('click', async () => {
  const banner = document.getElementById('installBanner');
  banner.classList.add('hidden');
  if (state.deferredPrompt) {
    state.deferredPrompt.prompt();
    await state.deferredPrompt.userChoice;
    state.deferredPrompt = null;
  }
});

document.getElementById('installDismiss').addEventListener('click', () => {
  document.getElementById('installBanner').classList.add('hidden');
});

// ─── UTILS ───────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function text(v) { return v === null || v === undefined || v === '' ? '—' : String(v); }

function compact(str, max = 140) {
  const s = text(str).replace(/\s+/g, ' ').trim();
  return s.length <= max ? s : s.slice(0, max - 3) + '...';
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function confClass(c) {
  if (c >= 0.7) return 'high';
  if (c >= 0.4) return 'medium';
  return 'low';
}

function confBadgeClass(c) {
  if (c >= 0.7) return 'conf-badge-high';
  if (c >= 0.4) return 'conf-badge-med';
  return 'conf-badge-low';
}

// ─── TABS ─────────────────────────────────────────────────────────────────────

function updateActiveTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tabName);
  });
}

document.getElementById('tabBar').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const t = tab.dataset.tab;
  if (t === 'settings') { state.screen = 'settings'; updateActiveTab(t); render(); return; }
  if (t === 'agent') { state.screen = 'agent'; updateActiveTab(t); render(); setTimeout(initAgent, 50); return; }
  if (t === 'whatsapp') {
    state.screen = 'whatsapp';
    updateActiveTab(t);
    render();
    fetch(`${API_BASE}/whatsapp`).then(r => r.json()).then(data => {
      state.waState = data;
      updateWhatsAppUI();
    }).catch(() => {});
    setTimeout(initWhatsAppWA, 50);
    return;
  }
  state.screen = 'stream';
  updateActiveTab('stream');
  render();
  loadListings();
});

document.getElementById('settingsBtn').addEventListener('click', () => {
  state.screen = 'settings';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  render();
});

// ─── DATA LOADING ─────────────────────────────────────────────────────────────

async function loadListings() {
  try {
    const res = await fetch(`${API_BASE}/listings?limit=200`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const oldCount = state.listings.length;
    state.listings = Array.isArray(data) ? data : [];
    if (oldCount > 0 && state.listings.length > oldCount && state.voiceEnabled) {
      const newRec = state.listings[0];
      if (newRec && (newRec.type === 'requirement' || state.voiceAutoListings)) {
        speakRecord(newRec);
      }
    }
  } catch {
    state.listings = [];
  }

  try {
    const grpRes = await fetch(`${API_BASE}/groups`);
    if (grpRes.ok) {
      state.groupInsights = await grpRes.json();
    }
  } catch {
    state.groupInsights = null;
  }

  renderStreamListings();
  renderSidebarList();
}

// ─── VOICE ───────────────────────────────────────────────────────────────────

function formatRecordForSpeech(record) {
  const type = record.type === 'listing_rent' ? 'rent listing' :
    record.type === 'listing_sale' ? 'sale listing' :
      record.type === 'requirement' ? 'requirement' : 'message';
  const groupName = record.group_name || 'unknown group';
  const entries = record.entries || [];
  if (entries.length === 0) return `New ${type} in ${groupName}`;
  const e = entries[0];
  const parts = [];
  if (e.property_type) parts.push(e.property_type);
  if (e.location?.sub_area || e.location?.area) parts.push('in ' + [e.location.sub_area, e.location.area].filter(Boolean).join(', '));
  if (e.price) parts.push(e.price);
  if (e.area_sqft) parts.push(e.area_sqft + ' sq ft');
  if (e.furnishing) parts.push(e.furnishing);
  const details = parts.join(', ');
  if (record.type === 'requirement') return `New requirement in ${groupName}: ${details}`;
  return `New ${type}: ${details}`;
}

async function speakText(text) {
  if (!state.voiceApiKey) {
    alert('Set ElevenLabs API key in Settings first');
    return;
  }
  if (state.currentlyPlaying) {
    state.currentlyPlaying.pause();
    state.currentlyPlaying = null;
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/voice/speak`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, speed: state.voiceSpeed }),
    });
    if (!res.ok) throw new Error('TTS error');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    state.currentlyPlaying = audio;
    audio.onended = () => { state.currentlyPlaying = null; };
    audio.onerror = () => { state.currentlyPlaying = null; };
    await audio.play();
  } catch (err) {
    console.error('Voice error:', err);
    state.currentlyPlaying = null;
  }
}

function speakRecord(record) {
  const text = formatRecordForSpeech(record);
  speakText(text);
}

async function fetchWithAI(prompt) {
  const key = state.aiKey;
  const prov = state.aiProvider;

  const sysPrompt = `Tu Mumbai ka broker hai. Baat kar simple aur natural Hinglish mein. Jaldi se jaldi point pe aa. Koi dikkat hai toh bol, madad karega.`;

  if (prov === 'gemini') {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `${sysPrompt}\n\nUser: ${prompt}` }] }],
          generationConfig: { maxOutputTokens: 512 }
        })
      }
    );
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
  }

  if (prov === 'groq') {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {

      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: sysPrompt },
          { role: 'user', content: prompt }
        ],
        max_tokens: 512
      })
    });
    const data = await res.json();
    return data.choices?.[0]?.message?.content || 'No response.';
  }

   if (prov === 'openrouter') {
     const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
       method: 'POST',
       headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
       body: JSON.stringify({

         messages: [
           { role: 'system', content: sysPrompt },
           { role: 'user', content: prompt }
         ],
         max_tokens: 512
       })
     });
     const data = await res.json();
     return data.choices?.[0]?.message?.content || 'No response.';
   }

   if (prov === 'doubleword') {
     const res = await fetch('https://api.doubleword.ai/v1/chat/completions', {
       method: 'POST',
       headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
       body: JSON.stringify({

           { role: 'system', content: sysPrompt },

 }

async function composeReply(listings, reqMsg) {
  const listings_context = buildContext(listings);
  const prompt = `A broker posted this requirement in a WhatsApp group:\n"${reqMsg}"\n\nFrom the available listings below, find the best matches and compose a brief, natural WhatsApp reply (in Hinglish is fine). Keep it under 3 short sentences. If no good match, say "Sorry, nothing matching right now."\n\n${listings_context}`;
  return await fetchWithAI(prompt);
}

function buildContext(records) {
  if (!records || records.length === 0) return 'No listings available.';
  const lines = [`Available listings (most recent first):`];
  for (const r of records.slice(0, 50)) {
    const type = r.type || 'unknown';
    const entries = Array.isArray(r.entries) ? r.entries : [];
    const msg = (r.cleaned_message || r.message || '').slice(0, 100);
    lines.push(`\n[${type}] "${msg}"`);
    if (entries.length === 0) {
      lines.push('  (no structured data)');
    } else {
      for (const e of entries) {
        const loc = [e.location?.sub_area, e.location?.area].filter(Boolean).join(', ');
        const price = e.price || e.budget_min || '';
        const sqft = e.area_sqft || '';
        const propType = e.property_type || '';
        lines.push(`  - ${propType} | ${loc || '—'} | ${price ? 'price ' + price : ''} ${sqft ? '| ' + sqft + ' sqft' : ''}`);
      }
    }
  }
  return lines.join('\n');
}

function extractLocations(listings) {
  const locationMap = new Map();

  for (const record of listings) {
    const entries = Array.isArray(record.entries) ? record.entries : [];
    for (const entry of entries) {
      const loc = entry.location?.sub_area || entry.location?.area;
      if (loc) {
        const normalized = loc.trim();
        const current = locationMap.get(normalized) || { name: normalized, count: 0, rent: 0, sale: 0, requirement: 0 };
        current.count += 1;
        if (record.type === 'listing_rent') current.rent += 1;
        else if (record.type === 'listing_sale') current.sale += 1;
        else if (record.type === 'requirement') current.requirement += 1;
        locationMap.set(normalized, current);
      }
    }
  }

  return [...locationMap.entries()]
    .map(([name, data]) => ({ name, ...data }))
    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
}

function renderStreamListings() {
  const container = document.getElementById('listingContainer');
  if (!container) return;

  let listings = state.listings;

  if (state.selectedLocation !== 'ALL') {
    listings = listings.filter(l => {
      const entries = Array.isArray(l.entries) ? l.entries : [];
      return entries.some(e => {
        const loc = e.location?.sub_area || e.location?.area;
        return loc && loc.trim() === state.selectedLocation;
      });
    });
  }

  if (state.filter !== 'ALL') {
    const typeMap = { 'RENT': 'listing_rent', 'SALE': 'listing_sale', 'REQUIREMENT': 'requirement' };
    const filterType = typeMap[state.filter] || state.filter.toLowerCase();
    listings = listings.filter(l => l.type === filterType);
  }

  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    listings = listings.filter(l => {
      const searchText = [
        l.cleaned_message || '',
        l.message || '',
        l.group_name || '',
        ...(Array.isArray(l.entries) ? l.entries.flatMap(e => [e.location?.area, e.location?.sub_area, e.property_type].filter(Boolean)) : [])
      ].join(' ').toLowerCase();
      return searchText.includes(q);
    });
  }

  const confThreshold = 0.4;
  listings = listings.filter(l => (l.confidence || 0) >= confThreshold);

  if (listings.length === 0) {
    const locText = state.selectedLocation !== 'ALL' ? ` in ${state.selectedLocation}` : '';
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#x1F4E5;</div>
        <div>No ${state.filter === 'ALL' ? '' : state.filter + ' '}listings${locText} yet<span class="blink-cursor"></span></div>
      </div>`;
    return;
  }

  container.innerHTML = listings.map(record => {
    const entries = Array.isArray(record.entries) ? record.entries : [];
    const avgConf = entries.length > 0
      ? entries.reduce((s, e) => s + (e.confidence || 0), 0) / entries.length
      : 0;
    const cc = confClass(avgConf);
    const bcc = confBadgeClass(avgConf);
    const type = text(record.type);
    const first = entries[0] || {};

    const price = first.price ? '₹' + (first.price >= 100000 ? (first.price/100000).toFixed(2) + 'L' : first.price.toLocaleString('en-IN')) : (first.budget_min ? '₹' + (first.budget_min/100000).toFixed(1) + 'L' : '');
    const areaLoc = [first.location?.sub_area, first.location?.area].filter(Boolean).join(', ');
    const area = first.area_sqft ? first.area_sqft + ' sqft' : '';
    const furnish = first.furnishing ? first.furnishing : '';

    const chipItems = [area, furnish, first.property_type].filter(Boolean).map(v => `<span class="chip">${esc(v)}</span>`).join('');

    const contacts = Array.isArray(record.contacts) ? record.contacts.map(c => c.number || c).filter(Boolean).join(', ') : '';

    const recId = esc(record._id || '');
    const isReq = record.type === 'requirement';
    return `
      <article class="listing-card conf-${cc}" data-id="${recId}" data-group="${esc(record.group_id || '')}" data-name="${esc(record.group_name || '')}">
        <div class="listing-header">
          <span class="listing-type">${esc(type)}</span>
          <span class="confidence-badge ${bcc}">${(avgConf * 100).toFixed(0)}%</span>
        </div>
        <div class="listing-main">
          <div class="listing-price">${price || '—'}</div>
          <div class="listing-area-loc">${esc(areaLoc) || '—'}</div>
          ${chipItems ? `<div class="listing-other">${chipItems}</div>` : ''}
        </div>
        <div class="listing-meta">
          <span>${esc(record.group_name || '—').slice(0, 18)}</span>
          <span>${timeAgo(record.timestamp)}</span>
        </div>
        ${contacts ? `<div class="listing-contacts">&#x1F4DE; ${esc(contacts)}</div>` : ''}
        ${isReq ? `<div class="listing-actions"><button class="draft-reply-btn" data-id="${recId}" data-group="${esc(record.group_id || '')}" data-name="${esc(record.group_name || '')}" data-sender="${esc(record.contacts?.[0] || '')}" data-msg="${esc((record.cleaned_message || record.message || '').slice(0, 200))}">&#x2709; Draft Reply</button></div>` : ''}
        <div class="listing-raw">${esc(record.cleaned_message || record.message || '')}</div>
      </article>`;
  }).join('');

  container.querySelectorAll('.listing-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.draft-reply-btn')) return;
      card.classList.toggle('expanded');
    });
  });

  container.querySelectorAll('.draft-reply-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (btn.classList.contains('drafting')) return;
      const groupId = btn.dataset.group;
      const groupName = btn.dataset.name;
      const sender = btn.dataset.sender;
      const reqMsg = btn.dataset.msg;
      const recordId = btn.dataset.id;

      btn.classList.add('drafting');
      btn.textContent = 'Drafting...';

      try {
        const replyText = await composeReply(state.listings, reqMsg);
        if (!replyText || replyText.trim().length < 5) {
          btn.textContent = 'No match found';
          btn.classList.remove('drafting');
          setTimeout(() => { btn.textContent = '\u2709 Draft Reply'; }, 2000);
          return;
        }

        const sent = await fetchJson('/api/replies', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            groupId,
            groupName,
            sourceMessageId: recordId,
            sourceSenderNumber: sender,
            text: replyText,
          }),
        });

        btn.classList.remove('drafting');
        btn.classList.add('sent');
        btn.textContent = '\u2713 Sent!';
        setTimeout(() => { btn.textContent = '\u2709 Draft Reply'; btn.classList.remove('sent'); }, 3000);
      } catch (err) {
        btn.classList.remove('drafting');
        btn.textContent = 'Failed - retry';
        setTimeout(() => { btn.textContent = '\u2709 Draft Reply'; }, 2500);
      }
    });
  });

  container.querySelectorAll('.voice-play-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const rec = state.listings.find(l => l._id === id);
      if (rec) speakRecord(rec);
    });
  });
}

// ─── AGENT ────────────────────────────────────────────────────────────────────

let agentInitialized = false;

function initAgent() {
  if (agentInitialized) return;
  agentInitialized = true;

  const form = document.getElementById('chatForm');
  if (!form) return;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';

    appendBubble('user', msg);
    state.chatHistory.push({ role: 'user', content: msg });
    saveChatHistory();

    showTyping();
    scrollChat();

    try {
      const context = buildContext();
      const prompt = context + '\n\nUser: ' + msg;
      const response = await fetchWithAI(prompt);
      hideTyping();
      appendBubble('agent', response);
      state.chatHistory.push({ role: 'assistant', content: response });
      saveChatHistory();
    } catch (err) {
      hideTyping();
      appendBubble('error', 'AI request failed: ' + err.message);
    }

    scrollChat();
  });

  document.querySelectorAll('.prompt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById('chatInput');
      input.value = btn.textContent.trim();
      input.focus();
    });
  });
}

function renderAgent(main) {
  const providerLabel = state.aiProvider === 'gemini' ? 'Gemini' :
                         state.aiProvider === 'groq' ? 'Groq' :
                         state.aiProvider === 'openrouter' ? 'OpenRouter' :
                         state.aiProvider === 'doubleword' ? 'Doubleword' : 'AI';

  main.innerHTML = `
    <div class="agent-screen">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-bubble agent">Kya haal hai bhai! Bol kya chaiye - property ka reply banana hai ya koi sawaal hai listings ke baare mein.&nbsp;&#x1F4AC;</div>

          <button class="send-btn" type="submit" id="sendBtn">&#x27A4;</button>

    </div>`;

  if (state.chatHistory.length > 0) {

function buildContext() {
  const records = state.listings;
  if (!records.length) return 'No listings data available yet.';

  const lines = [];

  if (state.groupInsights && state.groupInsights.length > 0) {
    lines.push(`WHATSAPP GROUPS (${state.groupInsights.length} groups):`);
    for (const g of state.groupInsights.slice(0, 20)) {
      lines.push(`  ${g.name}: ${g.records} records, ${g.entries} entries, ${g.errors} errors, latest: ${g.latest || 'unknown'}`);
    }
    lines.push('');
  }

  lines.push(`LISTINGS (${records.length} records):`);

  for (const r of records.slice(0, 50)) {
    const group = r.group_name || r.group_id || 'unknown';
    const type = r.type || 'unknown';
    const entries = Array.isArray(r.entries) ? r.entries : [];
    const msg = (r.cleaned_message || r.message || '').slice(0, 100);

    lines.push(`\n[${type}] ${group}: "${msg}"`);

    if (entries.length === 0) {
      if (r.extraction_error) lines.push(`  ERROR: ${r.extraction_error}`);
      else lines.push(`  NO_ENTRIES`);
    } else {
      for (const e of entries) {
        const intent = e.intent || '';
        const propType = e.property_type || '';
        const subArea = e.location?.sub_area || '';
        const area = e.location?.area || '';
        const price = e.price || '';
        const budgetMin = e.budget_min || '';
        const budgetMax = e.budget_max || '';
        const sqft = e.area_sqft || '';
        const conf = e.confidence !== undefined ? e.confidence : '?';
        let l = `  ${intent} ${propType}`.trim();
        if (subArea || area) l += ` | ${[subArea, area].filter(Boolean).join(', ')}`;
        if (price) l += ` | price ${price}`;
        if (budgetMin || budgetMax) l += ` | budget ${budgetMin}${budgetMax ? '-' + budgetMax : ''}`;
        if (sqft) l += ` | ${sqft} sqft`;
        l += ` | conf ${typeof conf === 'number' ? conf.toFixed(2) : conf}`;
        lines.push(l);
      }
    }
  }

  return lines.join('\n');
}

function appendBubble(role, content) {
  const msgs = document.getElementById('chatMessages');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = `chat-bubble ${role}`;
  div.textContent = content;
  msgs.appendChild(div);
  scrollChat();
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingEl';
  div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  msgs.appendChild(div);
  scrollChat();
}

function hideTyping() {
  const el = document.getElementById('typingEl');
  if (el) el.remove();
}

function scrollChat() {
  const msgs = document.getElementById('chatMessages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

// ─── WHATSAPP ─────────────────────────────────────────────────────────────────

function initWhatsAppWA() {
  if (state.waSSE) {
    state.waSSE.close();
  }
  state.waSSE = new EventSource(`${API_BASE}/whatsapp/events`);
  state.waSSE.onmessage = (e) => {
    const data = JSON.parse(e.data);
    state.waState = data;
    updateWhatsAppUI();
  };
  state.waSSE.onerror = () => {
    state.waSSE.close();
    state.waSSE = null;
  };
}

async function connectWhatsApp() {
  state.waState = { state: 'starting', qr: null, error: null };
  updateWhatsAppUI();
  try {
    const res = await fetch(`${API_BASE}/whatsapp/connect`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) {
      state.waState = { state: 'error', qr: null, error: data.error || 'Connection failed' };
    }
  } catch (e) {
    state.waState = { state: 'error', qr: null, error: 'Network error' };
  }
  updateWhatsAppUI();
}

async function disconnectWhatsApp() {
  try {
    await fetch(`${API_BASE}/whatsapp/disconnect`, { method: 'POST' });
  } catch {}
}

function updateWhatsAppUI() {
  const ws = state.waState;
  const statusEl = document.getElementById('waPanelStatus');
  const qrCard = document.getElementById('waQrCard');
  const qrImg = document.getElementById('waQrImg');
  const errCard = document.getElementById('waErrCard');
  const errText = document.getElementById('waErrText');
  const connectBtn = document.getElementById('waConnectBtn');
  const disconnectBtn = document.getElementById('waDisconnectBtn');

  if (!statusEl) return;

  const statusClass = ws.state === 'connected' ? 'wa-status-connected' :
                     ws.state === 'error' ? 'wa-status-error' :
                     ws.state === 'starting' ? 'wa-status-starting' : 'wa-status-disconnected';
  statusEl.className = `wa-status-value ${statusClass}`;
  statusEl.textContent = ws.state.replace('_', ' ');

  if (ws.state === 'qr_available' && ws.qr) {
    qrCard?.classList.remove('hidden');
    qrImg.src = ws.qr;
  } else {
    qrCard?.classList.add('hidden');
  }

  if (ws.state === 'error' && ws.error) {
    errCard?.classList.remove('hidden');
    if (errText) errText.textContent = ws.error;
  } else {
    errCard?.classList.add('hidden');
  }

  if (ws.state === 'disconnected' || ws.state === 'error') {
    connectBtn?.classList.remove('hidden');
    connectBtn.disabled = false;
    disconnectBtn?.classList.add('hidden');
  } else if (ws.state === 'connected') {
    connectBtn?.classList.add('hidden');
    disconnectBtn?.classList.remove('hidden');
  } else {
    connectBtn?.classList.remove('hidden');
    connectBtn.disabled = true;
    disconnectBtn?.classList.add('hidden');
  }
}

function renderWhatsApp(main) {
  initWhatsAppWA();
  const ws = state.waState;
  const isConnected = ws.state === 'connected';
  const hasQR = ws.state === 'qr_available' && ws.qr;
  const hasErr = ws.state === 'error' && ws.error;

  main.innerHTML = `
    <div class="whatsapp-screen">

      <div class="wa-status-card">
        <div class="wa-status-icon">${isConnected ? '&#x1F4F1;' : '&#x1F4E4;'}</div>
        <div class="wa-status-label">Connection Status</div>
        <div id="waPanelStatus" class="wa-status-value wa-status-${ws.state}">${ws.state.replace('_', ' ')}</div>
      </div>

      ${hasQR ? `
      <div class="wa-qr-card" id="waQrCard">
        <h3>Scan to Connect</h3>
        <img id="waQrImg" class="wa-qr-img" src="${ws.qr}" alt="WhatsApp QR">
        <p class="wa-qr-hint">Open WhatsApp on your phone → Linked Devices → Scan this code</p>
      </div>` : ''}

      ${hasErr ? `
      <div class="wa-error-card" id="waErrCard">
        <div id="waErrText">${ws.error}</div>
      </div>` : ''}

      ${isConnected ? `
      <div class="wa-info-card">
        &#x1F4F1; WhatsApp is connected. New messages will appear in the Stream.
      </div>` : `
      <div class="wa-info-card">
        Connect your WhatsApp to start receiving property listings from your groups.
      </div>`}

      <div class="wa-actions">
        <button class="wa-btn wa-btn-connect" id="waConnectBtn" type="button"
          ${ws.state === 'starting' || isConnected ? 'disabled' : ''}>
          ${ws.state === 'starting' ? 'Connecting...' : 'Connect Phone'}
        </button>
        <button class="wa-btn wa-btn-disconnect ${isConnected ? '' : 'hidden'}" id="waDisconnectBtn" type="button">
          Disconnect
        </button>
      </div>

    </div>`;

  document.getElementById('waConnectBtn')?.addEventListener('click', connectWhatsApp);
  document.getElementById('waDisconnectBtn')?.addEventListener('click', disconnectWhatsApp);
}
