services:
  backend:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../apps/api/.env
    volumes:
      - backend_sessions:/app/sessions
    networks:
      - propai-network
    restart: always

  frontend:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../apps/web/.env.local
    depends_on:
      - backend
    networks:
      - propai-network
    restart: always

  ollama:
    image: ollama/ollama
    container_name: ollama
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    ports:
      - "11434:11434"

    volumes:
      - ollama:/root/.ollama
    networks:
      - propai-network
    restart: always

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - propai-network
    depends_on:
      - frontend
      - backend

  coqui-tts:
    image: ghcr.io/coqui-ai/tts-cpu
    container_name: coqui-tts
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    ports:
      - "5002:5002"

    volumes:
      - tts_models:/root/.local/share/tts
    command: ["--model_name", "tts_models/en/vctk/vits", "--port", "5002"]
    restart: unless-stopped
    networks:
      - propai-network

networks:
  propai-network:
    driver: bridge

volumes:
  ollama:
  backend_sessions:
  caddy_data:
  caddy_config:
  tts_models:
