services:
  backend:
    build: 
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../apps/api/.env
    volumes:
      - ../apps/api/sessions:/app/sessions
    restart: always
    networks:
      - propai-network

  frontend:
    build: 
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../apps/web/.env
    depends_on:
      - backend
    restart: always
    networks:
      - propai-network

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: always
    networks:
      - propai-network

  coqui-tts:
    image: ghcr.io/coqui-ai/tts-cpu
    container_name: coqui-tts
    ports:
      - "5002:5002"
    volumes:
      - tts_models:/root/.local/share/tts
    command: python3 TTS/server/server.py --model_name tts_models/en/vctk/vits --port 5002
    restart: unless-stopped
    networks:
      - propai-network

networks:
  propai-network:
    driver: bridge

volumes:
  ollama:
  tts_models:
