services:
  backend:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - apps/api/.env
    volumes:
      - backend_sessions:/app/sessions
    networks:
      - propai-network
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env
    depends_on:
      - backend
    networks:
      - propai-network
    restart: always

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - propai-network
    restart: always

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - propai-network
    depends_on:
      - frontend
      - backend

networks:
  propai-network:
    driver: bridge

volumes:
  ollama:
  backend_sessions:
  caddy_data:
  caddy_config:
